name: Creditwatch
options:
  bundleIdPrefix: com.shimondeitel.creditwatch
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Creditwatch:
    type: application
    platform: iOS
    sources:
      - path: Creditwatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.creditwatch
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Creditwatch/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  CreditwatchTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CreditwatchTests
      - path: Creditwatch.storekit
    dependencies:
      - target: Creditwatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.creditwatch.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  CreditwatchUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CreditwatchUITests
    dependencies:
      - target: Creditwatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.creditwatch.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Creditwatch:
    build:
      targets:
        Creditwatch: all
        CreditwatchTests: [test]
        CreditwatchUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Creditwatch.storekit
    test:
      config: Debug
      storeKitConfiguration: Creditwatch.storekit
      targets:
        - CreditwatchTests
        - CreditwatchUITests
    archive:
      config: Release
